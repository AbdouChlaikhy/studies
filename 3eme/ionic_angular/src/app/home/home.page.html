<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Blank
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Blank</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Calculs</ion-card-title>
        
      </ion-card-header>
      <ion-card-content>
        <ion-grid>
          <ion-input [(ngModel)]="result" disabled></ion-input>
          <ion-row>
            <ion-col size="3" *ngFor="let digit of ['7', '8', '9', '+', '4', '5', '6', '-', '1', '2', '3', '*', 'C', '0', '=']">
              <ion-button (click)="digit === 'C' ? clear() : digit === '=' ? calculate() : append(digit)">{{ digit }}</ion-button>
            </ion-col>
          </ion-row>
        </ion-grid>
        <ion-button (click)="goToMw()">Go to weather</ion-button><br/>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
