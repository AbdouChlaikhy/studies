<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>meteoWidget</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">meteoWidget</ion-title>
    </ion-toolbar>
  </ion-header>
  <div>
    <ion-back-button defaultHref="/home">Back!!!</ion-back-button>
    

    <ion-item>
      <ion-label position="floating">Enter City Name</ion-label>
      <ion-input type="text" [(ngModel)]="cityName"></ion-input>
      <ion-button slot="end" (click)="searchCity()">Search</ion-button>
    </ion-item>

    <ion-card *ngIf="weatherData">
      <ion-card-header>
        <ion-card-title>Weather</ion-card-title>
        <ion-card-subtitle>{{ pays }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <ion-list>

          <ion-item>
            <img src="https://flagsapi.com/{{ pays }}/flat/64.png">   </ion-item>

            <ion-item><ion-label>temperature: {{ temp }} C°</ion-label></ion-item>

          <ion-item>
            
            <ion-label>pression : {{ pres }}</ion-label>
          </ion-item>
          <ion-item>
            <ion-label> humidité: {{ hum }}</ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
